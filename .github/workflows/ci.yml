name: CI — Deep Learning Cars

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short || true

      - name: Smoke test — GA headless (5 gens)
        run: |
          python main.py --headless --generations 5

      - name: Smoke test — PPO headless (5 eps)
        run: |
          python main.py --algorithm ppo --headless --generations 5

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deep-learning-cars .

      - name: Smoke test — Docker headless
        run: |
          docker run --rm deep-learning-cars --headless --generations 3
